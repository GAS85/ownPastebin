# Dev Push
  dev-push:
    runs-on: ubuntu-latest
    needs: test

    if: github.ref == 'refs/heads/dev'
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image name
        id: repo
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=dev
            VCS_REF=${{ steps.meta.outputs.VCS_REF }}
            BUILD_DATE=${{ steps.meta.outputs.BUILD_DATE }}
          tags: docker.io/${{ steps.repo.outputs.REPO }}::${{ steps.meta.outputs.VERSION }}

# Release Push
  build-and-push:
    runs-on: ubuntu-latest
    #    runs-on: docker:cli
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') && github.ref_name != '' && github.ref_name != null
    environment: prod

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set metadata
        id: meta
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "VCS_REF=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image name
        id: repo
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.meta.outputs.VERSION }}
            VCS_REF=${{ steps.meta.outputs.VCS_REF }}
            BUILD_DATE=${{ steps.meta.outputs.BUILD_DATE }}
          tags: |
            docker.io/${{ steps.repo.outputs.REPO }}:${{ steps.meta.outputs.VERSION }}
            docker.io/${{ steps.repo.outputs.REPO }}:latest
