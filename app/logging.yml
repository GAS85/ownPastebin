version: 1
disable_existing_loggers: false

formatters:
  default:
    format: "%(asctime)s - %(levelname)s - %(name)s - %(message)s"
    datefmt: "DATE_FORMAT"

handlers:
  console:
    class: logging.StreamHandler
    formatter: default
    stream: ext://sys.stdout

root:
  level: INFO
  handlers: [console]

loggers:
  uvicorn:
    level: INFO
  uvicorn.error:
    level: WARNING
  uvicorn.access:
    level: INFO
