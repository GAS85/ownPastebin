services:
  pastebin:
    build: .
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379/0
      # These environment variables are used to configure the FastAPI application. You can adjust them as needed.
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8080
      - MAX_TTL=5
      # Base URL should be set to the public URL where your service will be accessible. For local testing, http://localhost:8080 is fine, but in production, it should be the actual domain or IP address.
      - BASE_URL=http://localhost:8080
      - SERVER_SIDE_ENCRYPTION_ENABLED=true
      # You can generate a random 32-byte key using: `openssl rand -base64 32` or docker container 'docker exec -it ownpastebin openssl rand -base64 32'
      - SERVER_SIDE_ENCRYPTION_KEY=your_base64_encoded_32_byte_key_here
    restart: always
    depends_on:
      - redis
#      redis:
#        condition: service_healthy

  redis:
    image: redis:7
    restart: always
    # You need to persist redis DB
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 3s
